<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<style>
    .rubik-regular {
  font-family: "Rubik", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}
    :root {
        --bac : rgb(240,240,240) ;
        --fonts : black ;
    }
    body {
    background-image: url(pexels-robert-clark-504241532-20087252.jpg);   /* ضع رابط الصورة هنا */
    background-size: cover;          /* تغطي الشاشة كاملة */
    background-position: center;     /* تُركز الصورة */
    background-repeat: no-repeat;    /* لا تتكرر */
    background-attachment: fixed;    /* تبقى ثابتة عند التمرير (اختياري) */
    min-height: 100vh;
}
    .divThree {
        display: flex;
        background-color: var(--bac);
        align-items: self-start;
        justify-content: center;
        height: 150px;
        border-radius: 0px 0px 30px 30px
    }
    .products-container {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .product-card {
      background: var(--bac);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-info {
      padding: 15px;
    }

    .product-info h3 {
      margin: 0 0 8px 0;
      font-size: 1.1rem;
    }

    .product-info p {
      margin: 6px 0;
      font-size: 0.95rem;
      color: var(--fonts);
    }

    .price {
      font-size: 1.25rem;
      font-weight: bold;
      color: #e91e63;
      margin: 10px 0;
    }
    
</style>
<body>
    <div style="margin: 20px 0px 0px 0px;">
        <footer style="background:var(--bac); font-family: var(--family) ;color:var(--fonts); padding:30px 0; direction:rtl; text-align:center;border-radius: 30px;">
        <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:30px; padding:0 20px;">
            
            <!-- اللوغو + الاسم (يمين) -->
            <div style="display:flex; align-items:center; gap:15px;">
            <img src="Untitled_design-removebg-preview.png" style="height:55px;background-color: transparent;border: none;padding: 0;">
            <div>
                <h2 class="rubik-regular"  style="margin:0; font-size:24px;"><b>السويدا.وورك</b></h2>
                
            </div>
            </div>
            
            <!-- القائمة (يسار) -->
            <div style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center;">
            developed by Wajed Faraj
            </div>
        </div>
        <div style="border-top:1px solid #333; margin-top:40px; padding-top:20px; color:var(--fonts); font-size:25px; margin: 10p;">
                منصة تحوي على العديد من فرص العمل بمختلف المجالات
        </div>
        <div style="font-size: 20px;">انت صاحب عمل و تريد ادراج اعلان , اضغط <a href="contact.html">هنا</a> </div>
    </footer>
    </div>
    <div id = "work-footer" style="background-color: var(--bac);display: none;height: 80px;align-items: center;margin:20px; justify-content: center;border-radius: 30px;
        ">
    <b id ="aspect">عروض العمل المتعلقة  بمجال 
    </b>
    </div>
    <div class="products-container" id="productsContainer"></div>

    </div>
    
    <div id='divTwo'  style="max-width:1300px; margin: 40px 0px 0px 0px;font-size: 35px;justify-content: right; align-items:top;gap:30px;border-radius: 30px 30px 0px 0px ;height: 50px;padding: 20px;background-color: var(--bac);display: flex;;">
    قم باختيار المجال بناءً على  المهارة او الخبرة
    </div>
    <div id='divThree' class="divThree">
<form id="form"  style="display: flex;justify-content: center;width: 600px;">
        <select  id="category" style="width: 60% ;height: 50px;" >
        <option value="" selected></option>
        <option value="tech">التكنولوجيا</option>
        <option value="free">أعمال حرة (بناء ,ميكانيك , نجارة ، حدادة . . )</option>
        <option value="elec">كهرباء , الكترونيات , طاقة متجددة</option>
        <option value="health">الصحة</option>
        <option value="food">الطبخ و المأكولات</option>
        <option value="manage" >إدارة أعمال , خدمات مكتبية</option>
        <option value="salon">صالونات (تجميل , حلاقة , تاتو )</option>
        <option value="teach">التعليم</option>
        <option value="sport">الرياضة</option>
        <option value="art">فنون / أعمال يدوية / التصميم</option>
        <option value="no">بدون خبرة</option>
        </select>
</form>
<script>
    if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        document.getElementById("divTwo").style.display = "block" ;
        document.getElementById("form").style.margin = "100px 0px 700px 0px" ;
        
    };
</script>

</div>
    <script>
        //===============================================================================================================================
        
        const products = 
        {
        "S":[{
            loc: "اسم المنتج 1",
            description: "وصف مختصر\n\r للمنتج هنا",
            cont: 299,
        }],
        "saab":[{
            loc: "اسم المنتج 2",
            description: "وصف  ىجثهصخللمنتج هنا",
            cont: 450,
        }],
        teach:[

        ],
        };
        let aspect = document.getElementById("aspect")
        let dTwo = document.getElementById("divTwo")
        let dThree = document.getElementById("divThree")
        const b = document.getElementById("category")
        let workFooter=document.getElementById("work-footer")
        // for (let i =0;i<10 ; i++) {
        //     if (b.value == products[b.]) {
        //         let y =products[i]
        //     }
        //     else {
        //         continue ;
        //     }
        // }
        b.addEventListener('change' , () => {
            const b = document.getElementById("category")
            let y = products[b.value]
            dTwo.style.display = "none";
            dThree.style.display = "none";
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            document.getElementById("back-div").style.display = "flex"
            y.forEach(product => {
            const cardHTML = `
            <div class="product-card">
                <div class="product-info">
                <h3>${product.loc}</h3>
                <p>${product.description}</p>
                <a href="tel:${product.cont}" class="price"> للتواصل ${product.cont} </a>
                <!-- أضف هنا أي تفاصيل إضافية تريدها -->
                </div>
            </div>
            `;
            container.innerHTML += cardHTML;
            container.style.display = "grid"
            workFooter.style.display = "flex"
            aspect.textContent = ` ${b.value} عروض العمل المتعلقة بمجال `
            });
            }
                    )

        
        //================================================================================================================================
        
                
    </script>
    <div style="display: flex;justify-content: center;align-items: center;margin: 10px 0px 0px 0px;font-size: 25px;height: 80px; width: auto;border-radius: 30px;background-color: rgb(240,240,240,0);">
        <div id="back-div"  style="display: none;justify-content: center;align-items: center;font-size: 25px;height: 80px; width: 80px;border-radius: 30px;background-color: rgb(240,240,240);">
                    <a style="color: #551a8b;" href="javascript:location.reload()   ">رجوع</a>

        </div>
    </div>
</body>

</html>
