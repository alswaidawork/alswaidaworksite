<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<style>
    .rubik-regular {
  font-family: "Rubik", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}
    :root {
        --bac : rgb(240,240,240) ;
        --fonts : black ;
    }
    body {
    background-image: url(pexels-robert-clark-504241532-20087252.jpg);   /* ضع رابط الصورة هنا */
    background-size: cover;          /* تغطي الشاشة كاملة */
    background-position: center;     /* تُركز الصورة */
    background-repeat: no-repeat;    /* لا تتكرر */
    background-attachment: fixed;    /* تبقى ثابتة عند التمرير (اختياري) */
    min-height: 100vh;
}
    .divThree {
        display: flex;
        background-color: var(--bac);
        align-items: self-start;
        justify-content: center;
        height: 150px;
        border-radius: 0px 0px 30px 30px
    }
    .products-container {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .product-card {
      background: var(--bac);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-info {
      padding: 15px;
    }

    .product-info h3 {
      margin: 0 0 8px 0;
      font-size: 1.1rem;
    }

    .product-info p {
      margin: 6px 0;
      font-size: 0.95rem;
      color: var(--fonts);
    }

    .price {
      font-size: 1.25rem;
      font-weight: bold;
      color: #e91e63;
      margin: 10px 0;
    }
    
</style>
<body>
    <div style="margin: 20px 0px 0px 0px;">
        <footer style="background:var(--bac); font-family: var(--family) ;color:var(--fonts); padding:30px 0; direction:rtl; text-align:center;border-radius: 30px;">
        <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:30px; padding:0 20px;">
            
            <!-- اللوغو + الاسم (يمين) -->
            <div style="display:flex; align-items:center; gap:15px;">
            <img src="Untitled_design-removebg-preview.png" style="height:55px;background-color: transparent;border: none;padding: 0;">
            <div>
                <h2 class="rubik-regular"  style="margin:0; font-size:24px;"><b>السويدا.وورك</b></h2>
                
            </div>
            </div>
            
            <!-- القائمة (يسار) -->
            <div style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center;">
            developed by Wajed Faraj
            </div>
        </div>
        <div class="rubik-regular"  style="border-top:1px solid #333; margin-top:40px; padding-top:20px; color:var(--fonts); font-size:20px;font-family: 'Cairo',sans-serif; margin: 10px;font-size: 25px;">
                منصة تحوي على العديد من فرص العمل بمختلف المجالات
        </div>
        <div style="font-size: 20px;">انت صاحب عمل و تريد ادراج اعلان , اضغط <a href="contact.html">هنا</a> </div>
    </footer>
    </div>
    <div id = "work-footer" style="background-color: var(--bac);display: none;height: 80px;align-items: center;margin:20px; justify-content: center;border-radius: 30px;
        ">
    <b id ="aspect">عروض العمل المتعلقة  بالمجال 
    </b>
    </div>
    <div class="products-container" id="productsContainer"></div>

    </div>
    <div id='divTwo' class="rubik-regular"  style="max-width:1300px; margin: 40px 0px 0px 0px;font-size: 35px;justify-content: right; align-items:top;gap:30px;border-radius: 30px 30px 0px 0px ;height: 50px;padding: 20px;background-color: var(--bac);display: flex;;">
     قم باختيار التصنيف
        <!-- <div style="font-size: 40px;display:flex;border-radius: 30px;justify-content:right;">
            قم باختيار التصنيف
        </div> -->
     </div>
    <div id='divThree' class="divThree">
<form style="width: 600px;">
        <select  id="category" style="width: 60% ;height: 50px;">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="S">S</option>
        <option value="audi">Audi</option>
        </select>
</form>

</div>
    <script>
        //===============================================================================================================================

        const products = 
        [
        {
            id: 1,
            name: "اسم المنتج 1",
            description: "وصف مختصر\n\r للمنتج هنا",
            price: 299,
            image: "https://via.placeholder.com/300x200?text=Product+1"
        },
        {
            id: 2,
            name: "اسم المنتج 2",
            description: "وصف  ىجثهصخللمنتج هنا",
            price: 450,
            image: ""
        },
        {},
        {},
        {},
        {},
        {}
        // أضف باقي المنتجات هنا...
        ];
        let aspect = document.getElementById("aspect")
        let dTwo = document.getElementById("divTwo")
        let dThree = document.getElementById("divThree")
        let b = document.getElementById("category")
        let workFooter=document.getElementById("work-footer")
        b.addEventListener('change' , () => {
            dTwo.style.display = "none";
            dThree.style.display = "none";
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            products.forEach(product => {
            const cardHTML = `
            <div class="product-card">
                <div class="product-info">
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <a href="tel:${product.price}" class="price"> للتواصل ${product.price} </a>
                <!-- أضف هنا أي تفاصيل إضافية تريدها -->
                </div>
            </div>
            `;
            container.innerHTML += cardHTML;
            container.style.display = "grid"
            workFooter.style.display = "flex"
            aspect.textContent = ` ${b.value} عروض العمل المتعلقة بمجال `
            });
            }
                    )

        
        //================================================================================================================================
        
                
    </script>
</body>

</html>
